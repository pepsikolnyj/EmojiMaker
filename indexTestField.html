<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
            margin: 0;
        }

        body {
            display: flex;
            flex-flow: column nowrap;
            justify-content: center;
            align-items: center;
            min-height: 100vh;

            background-image: url('imgs/bckgrnd.jpg');
            background-size: cover;
            background-repeat: no-repeat;
        }

        .flashcard-center {
            margin: auto;
            position: relative;
            display: inline-block;
        }
        .flashcard-center img {
            width: 250px;
            display: block;
            height: auto;
            position: relative;
        }
        .flashcard-title, .flashcard-title.correct, .flashcard-title.incorrect {
            position: absolute;
            font-size: 50px;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            text-shadow: 3px 3px 5px black,
                         -3px 3px 5px darkgray,
                         3px -3px 5px gray,
                         -3px -3px 5px white;
            top: 50%;
            left: 50%;
            /* Это свойство сдвигает блок назад на 50% его СОБСТВЕННОЙ ширины */
            transform: translate(-50%, -50%); 
            
            white-space: nowrap; /* Запрещаем перенос */
            margin: 0;           /* Убираем внешние отступы h1, которые дают перекос */
            padding: 0;          /* Убираем внутренние отступы */
            text-align: center;  /* На всякий случай для внутренней логики текста */
            text-decoration: none;
            text-underline-offset: 10px;
        }
        .flashcard-title.correct {
            color: #4CFF4C;
            text-shadow:
                0 0 4px #2ECC71,
                0 0 8px #27AE60,
                0 0 12px #00FF7F,
                0 0 18px #7CFC00;

        }
        .flashcard-title.incorrect {
            color: #FF4C4C; /* мягкий, но яркий красный */
            text-shadow:
                0 0 4px #E74C3C,     /* тёплый красный */
                0 0 8px #C0392B,     /* более тёмный слой */
                0 0 12px #FF6B6B,    /* светлый красный для свечения */
                0 0 18px #FF9999;    /* мягкая неоновая кайма */
        }
        .choose {
            display: flex;
            gap: 10px;
            position: absolute; /* поверх всего */
            bottom: 40px;       /* немного от нижнего края */
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;       /* выше flashcard-title */
            padding: 10px;
            background-color: rgba(122, 120, 120, 0.541); /* видимый фон */
            border-radius: 15px;
        }
        .item1, .item2, .item3 {
            width: 100px;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 38px;
            background-color: rgba(255, 255, 255, 0.3);
            font-size: 2em;
            color: #087d73;
            border: 2px solid rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="flashcard-center">
        <img src="imgs/ref2.png" alt="Reference Image 1">
        <h1 class="flashcard-title">Make a reference!</h1>
    </div>
    <div class="choose">
        <div class="item1">

        </div>
        <div class="item2">
            
        </div>
        <div class="item3">
            
        </div>
    </div>
    <div class="bottom">
        <p><i>Press Enter to begin...</i></p>
    </div>
    <script>

        const title = document.querySelector('.flashcard-title');
        const bottom = document.querySelector('.bottom');
        const choose = document.querySelector('.choose');
        const correctWords = ["neus", "mond", "ogen"];

        let flag = false;
        let userInput = "";

        choose.style.display = "none";

        function handleEnter(event) {
            if (event.key === 'Enter') {
            bottom.style.display = "block";
            bottom.innerHTML = "<p><i>Try to type something with your keyboard...</i></p>";
            title.style.display = 'none';

            // Переключаем флаг
            flag = true;

            // 2. Проверяем флаг ВНУТРИ функции
            if (flag) {
                // 3. Удаляем именно ЭТУ функцию по её имени
                document.removeEventListener('keydown', handleEnter);
                document.addEventListener('keydown', handleInput);
                document.addEventListener('keydown', checkWord);

                console.log("Событие Enter больше не отслеживается");
            }
        }
    }
    function handleInput(event){
        if (event.key.length === 1 && /^[a-zа-яё]$/i.test(event.key) && flag) {
            bottom.innerHTML = "<p><i>To erase letters, use Backspace...</i></p>";
            title.style.display = 'block';
            title.style.textDecoration = 'underline';
            userInput += event.key;
            renderSpacedText(userInput);
        }
        if (event.key === 'Backspace'){
            userInput = userInput.slice(0, -1);
            renderSpacedText(userInput);
            bottom.style.display = "block";
            bottom.innerHTML = "<p><i>Try to type something with your keyboard...</i></p>";
            choose.style.display = "none";
            title.classList.remove("correct", "incorrect")
            title.classList.add("flashcard-title");
            // title.style.color = "white";
        }
    }
    function renderSpacedText(text){
        title.innerHTML = "";

        text.split("").forEach(letter => {
            const span = document.createElement("span");
            span.textContent = letter;
            span.style.marginRight = "10px";
            title.appendChild(span);
        });
    }
    function checkWord(event){
        if (event.key === 'Enter'){

            let processedTitle = title.textContent.replace(/\s/g, "").toLowerCase();

            if(correctWords.includes(processedTitle)) {
                choose.style.display = "flex";
                title.classList.remove("incorrect")
                title.classList.add("correct");
                // title.style.color = "#4CFF4C";
            }
            else {
                choose.style.display = "none";
                title.classList.remove("correct")
                title.classList.add("incorrect");
                // title.style.color = "#FF4C4C";
            }
        } 
    }

    document.addEventListener('keydown', handleEnter);


    </script>
</body>
</html>
