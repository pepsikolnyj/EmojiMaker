<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Maker game!</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="flashcard-center">
        <!-- The head -->
        <svg class="head-img" viewBox="0 0 179.38721 179.81808">
            <g transform="translate(-0.40911873,-0.19709181)">
                <g transform="matrix(3.7372336,0,0,3.7462099,-44.447778,-44.757427)">
                    <g id="color">
                        <circle cx="36.002701" cy="36" r="23" fill="currentColor" />
                    </g>
                    <g id="line">
                        <circle cx="36.002701" cy="36" r="23"
                                fill="none"
                                stroke="#000"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round" />
                    </g>
                </g>
            </g>
        </svg>        
        <img src="" id="layer-eyes" class="face-part">
        <img src="" id="layer-mouth" class="face-part">
        
        <h1 class="flashcard-title">Make a reference!</h1>
    </div>
    <div class="choose">
        <div class="item1">
            <img src="" id="choose1" class="chooseImage">
        </div>
        <div class="item2">
            <img src="" id="choose2" class="chooseImage">
        </div>
        <div class="item3">
            <img src="" id="choose3" class="chooseImage">
        </div>
        <div class="item4">
            <img src="" id="choose4" class="chooseImage">
        </div>
        <div class="item5">
            <img src="" id="choose5" class="chooseImage">
        </div>
    </div>
    <div class="bottom">
        <p><i>Press Enter to begin...</i></p>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
